<line x1="930" y1="600" x2="980" y2="600" class="arr"/><text x="945" y="590" class="txt">No</text>
<line x1="800" y1="670" x2="800" y2="700" class="arr"/><text x="815" y="690" class="txt">Yes</text>
<line x1="800" y1="752" x2="800" y2="780" class="arr"/>
