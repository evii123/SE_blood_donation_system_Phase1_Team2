<rect x="85" y="520" width="1530" height="340" class="alt"/>
<text x="95" y="540" class="altlbl">Alternative</text>
<line x1="85" y1="700" x2="1615" y2="700" class="life"/>
<text x="100" y="692" class="altlbl">Success</text>
<text x="100" y="722" class="altlbl">Fail</text>
</svg>