<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980">
<defs><style>.t{font:700 37px Arial;fill:#1f2937}.a{font:600 20px Arial;fill:#111827}.m{font:500 18px Arial;fill:#111827}.box{fill:#93c5fd;stroke:#1d4ed8;stroke-width:2.3;rx:6}.life{stroke:#6b7280;stroke-width:2.3;stroke-dasharray:10 7}.arr{stroke:#374151;stroke-width:2.3;fill:none;marker-end:url(#ah)}.act{fill:#dbeafe;stroke:#60a5fa;stroke-width:2.07}.alt{fill:none;stroke:#60a5fa;stroke-width:2.3}.altlbl{font:700 17px Arial;fill:#1d4ed8}</style><marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#374151"/></marker></defs>
<text x="850" y="45" text-anchor="middle" class="t">Sequence Diagram 3: Hospital Request Fulfillment</text>
<rect x="50" y="90" width="160" height="54" class="box"/>
<text x="130" y="123" text-anchor="middle" class="a">Hospital Staff</text>
<line x1="130" y1="144" x2="130" y2="890" class="life"/>
<rect x="530" y="90" width="160" height="54" class="box"/>
<text x="610" y="123" text-anchor="middle" class="a">Hospital System</text>
<line x1="610" y1="144" x2="610" y2="890" class="life"/>
<rect x="1010" y="90" width="160" height="54" class="box"/>
<text x="1090" y="123" text-anchor="middle" class="a">Bank Service</text>
<line x1="1090" y1="144" x2="1090" y2="890" class="life"/>
<rect x="1490" y="90" width="160" height="54" class="box"/>
<text x="1570" y="123" text-anchor="middle" class="a">Database</text>
<line x1="1570" y1="144" x2="1570" y2="890" class="life"/>
<line x1="130" y1="200" x2="610" y2="200" class="arr"/>
<text x="370" y="192" text-anchor="middle" class="m">Create request</text>
<rect x="604" y="188" width="12" height="28" class="act"/>
<line x1="610" y1="270" x2="1570" y2="270" class="arr"/>
<text x="1090" y="262" text-anchor="middle" class="m">Insert request (pending)</text>
<rect x="1564" y="258" width="12" height="28" class="act"/>
<line x1="1570" y1="340" x2="610" y2="340" class="arr"/>
<text x="1090" y="332" text-anchor="middle" class="m">Request saved</text>
<rect x="604" y="328" width="12" height="28" class="act"/>
<line x1="130" y1="410" x2="610" y2="410" class="arr"/>
<text x="370" y="402" text-anchor="middle" class="m">Track request status</text>
<rect x="604" y="398" width="12" height="28" class="act"/>
<line x1="610" y1="480" x2="1090" y2="480" class="arr"/>
<text x="850" y="472" text-anchor="middle" class="m">Bank processes fulfill action</text>
<rect x="1084" y="468" width="12" height="28" class="act"/>
<line x1="1090" y1="550" x2="1570" y2="550" class="arr"/>
<text x="1330" y="542" text-anchor="middle" class="m">BEGIN + lock inventory row</text>
<rect x="1564" y="538" width="12" height="28" class="act"/>
<line x1="1570" y1="620" x2="1090" y2="620" class="arr"/>
<text x="1330" y="612" text-anchor="middle" class="m">Current stock</text>
<rect x="1084" y="608" width="12" height="28" class="act"/>
<line x1="1090" y1="690" x2="1570" y2="690" class="arr"/>
<text x="1330" y="682" text-anchor="middle" class="m">If enough: deduct units + fulfill</text>
<rect x="1564" y="678" width="12" height="28" class="act"/>
<line x1="1090" y1="760" x2="1570" y2="760" class="arr"/>
<text x="1330" y="752" text-anchor="middle" class="m">Else: rollback</text>
<rect x="1564" y="748" width="12" height="28" class="act"/>
<line x1="1090" y1="830" x2="610" y2="830" class="arr"/>
<text x="850" y="822" text-anchor="middle" class="m">Return result</text>
