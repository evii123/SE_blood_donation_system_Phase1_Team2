<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .title{font:700 37px Arial,sans-serif;fill:#1f2937}
      .actorLabel{font:600 20px Arial,sans-serif;fill:#1f2937}
      .sys{fill:#7dd3fc;stroke:#0f4c81;stroke-width:2.53}
      .oval{fill:#8fdaf7;stroke:#0f4c81;stroke-width:2.3}
      .txt{font:600 18px Arial,sans-serif;fill:#0f172a}
      .line{stroke:#4b5563;stroke-width:2.3;fill:none}
    </style>
  </defs>

  <text x="750" y="45" text-anchor="middle" class="title">Use Case Diagram of Blood Donation System</text>

  <!-- System boundary -->
  <rect x="430" y="110" width="620" height="780" class="sys"/>
  <text x="740" y="140" text-anchor="middle" class="txt">Blood Donation System</text>

  <!-- Actor: Donor -->
  <circle cx="150" cy="250" r="14" fill="#7dd3fc" stroke="#4b5563" stroke-width="2"/>
  <line x1="150" y1="264" x2="150" y2="312" class="line"/>
  <line x1="125" y1="285" x2="175" y2="285" class="line"/>
  <line x1="150" y1="312" x2="128" y2="344" class="line"/>
  <line x1="150" y1="312" x2="172" y2="344" class="line"/>
  <text x="150" y="370" text-anchor="middle" class="actorLabel">Donor</text>

  <!-- Actor: Bank Staff -->
  <circle cx="150" cy="520" r="14" fill="#7dd3fc" stroke="#4b5563" stroke-width="2"/>
  <line x1="150" y1="534" x2="150" y2="582" class="line"/>
  <line x1="125" y1="555" x2="175" y2="555" class="line"/>
  <line x1="150" y1="582" x2="128" y2="614" class="line"/>
  <line x1="150" y1="582" x2="172" y2="614" class="line"/>
  <text x="150" y="640" text-anchor="middle" class="actorLabel">Bank Staff</text>

  <!-- Actor: Hospital Staff -->
  <circle cx="150" cy="760" r="14" fill="#7dd3fc" stroke="#4b5563" stroke-width="2"/>
  <line x1="150" y1="774" x2="150" y2="822" class="line"/>
  <line x1="125" y1="795" x2="175" y2="795" class="line"/>
  <line x1="150" y1="822" x2="128" y2="854" class="line"/>
  <line x1="150" y1="822" x2="172" y2="854" class="line"/>
  <text x="150" y="880" text-anchor="middle" class="actorLabel">Hospital Staff</text>

  <!-- Donor use cases -->
  <ellipse cx="740" cy="220" rx="180" ry="34" class="oval"/>
  <text x="740" y="226" text-anchor="middle" class="txt">Register / Login</text>

  <ellipse cx="740" cy="290" rx="180" ry="34" class="oval"/>
  <text x="740" y="296" text-anchor="middle" class="txt">Manage Donor Profile</text>

  <ellipse cx="740" cy="360" rx="180" ry="34" class="oval"/>
  <text x="740" y="366" text-anchor="middle" class="txt">Book Appointment</text>

  <ellipse cx="740" cy="430" rx="180" ry="34" class="oval"/>
  <text x="740" y="436" text-anchor="middle" class="txt">View / Cancel Appointments</text>

  <!-- Bank use cases -->
  <ellipse cx="740" cy="520" rx="210" ry="34" class="oval"/>
  <text x="740" y="526" text-anchor="middle" class="txt">Review / Approve / Complete Appointment</text>

  <ellipse cx="740" cy="590" rx="180" ry="34" class="oval"/>
  <text x="740" y="596" text-anchor="middle" class="txt">Search Donor Info</text>

  <ellipse cx="740" cy="660" rx="180" ry="34" class="oval"/>
  <text x="740" y="666" text-anchor="middle" class="txt">Manage Inventory</text>

  <ellipse cx="740" cy="730" rx="180" ry="34" class="oval"/>
  <text x="740" y="736" text-anchor="middle" class="txt">Approve / Reject / Fulfill Request</text>

  <!-- Hospital use cases -->
  <ellipse cx="740" cy="800" rx="180" ry="34" class="oval"/>
  <text x="740" y="806" text-anchor="middle" class="txt">Create / Track Blood Requests</text>

  <!-- Associations Donor -->
  <line x1="178" y1="250" x2="560" y2="220" class="line"/>
  <line x1="178" y1="260" x2="560" y2="290" class="line"/>
  <line x1="178" y1="275" x2="560" y2="360" class="line"/>
  <line x1="178" y1="290" x2="560" y2="430" class="line"/>

  <!-- Associations Bank -->
  <line x1="178" y1="520" x2="530" y2="520" class="line"/>
  <line x1="178" y1="540" x2="560" y2="590" class="line"/>
  <line x1="178" y1="560" x2="560" y2="660" class="line"/>
  <line x1="178" y1="580" x2="560" y2="730" class="line"/>

  <!-- Associations Hospital -->
  <line x1="178" y1="760" x2="560" y2="220" class="line"/>
  <line x1="178" y1="780" x2="560" y2="800" class="line"/>
</svg>
